<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Circular Gap Buffer Text Editor</title>
        <link rel="stylesheet" href="./styles/editorframe.css">
        <link rel="stylesheet" href="./styles/textarea.css">
        <link rel="stylesheet" href="./styles/status.css">
        <script type="module" src="./srcs/main.js" defer></script>
        
</head>
<body>
  <main class="app">
    <header>
      <h1>Circular Gap Buffer Text Editor</h1>
      
    </header>

    <nav class="window-controls" aria-label="Text window navigation">
      <button id="first-window" type="button" title="Alt+Home">⏮ Start</button>
      <button id="previous-window" type="button" title="Alt+ArrowLeft or Alt+PageUp">← Previous window</button>
      <button id="next-window" type="button" title="Alt+ArrowRight or Alt+PageDown">Next window →</button>
      <button id="last-window" type="button" title="Alt+End">End ⏭</button>
      <span class="window-controls__hint">Keyboard: Alt+← / Alt+→, Alt+Home / Alt+End</span>
    </nav>

    <div class="editor-frame">
      <textarea
        id="editor"
        spellcheck="true"
        lang="en"
        autocomplete="off"
        autocorrect="off"
        autocapitalize="off"
        autofocus="n",
        cols="80"
        rows="25"
        wrap="soft"
      ></textarea>
    </div>

    <footer id="status-bar" class="status-bar" aria-live="polite">
  <section class="status-cursor">
    <div class="status-label">Cursor</div>
    <div class="status-main" id="status-cursor-global">Global 1:1</div>
    <div class="status-sub" id="status-cursor-local">Local 1:1</div>
  </section>

  <section class="status-window">
    <div class="status-label">Window</div>
    <div class="status-main" id="status-window-lines">Lines 1–1</div>
    <div class="status-sub" id="status-window-chars">Chars 0–0</div>
  </section>

  <section class="status-document">
    <div class="status-label">Document</div>
    <div class="status-main" id="status-document-lines">1 line</div>
    <div class="status-sub" id="status-document-size">0 chars · 0 words</div>
  </section>

  <section class="status-mode status-group-small">
    <div class="status-label">Mode</div>
    <div class="status-main" id="status-mode">Lines</div>
    <div class="status-sub" id="status-save">Saved</div>
  </section>
</footer>

    <section class="debug">
      <h2>Debug</h2>
      <pre id="debug"></pre>
    </section>
  </main>
</body>
</html>
